<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Video Live Translate</title>
  </head>
  <body>
    <div class="popup">
      <header class="head">
        <div class="head__brand">
          <span class="head__logo" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="4" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.75" />
              <path d="M8 20h8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
              <path d="M12 17v3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
          </span>
          <div class="head__titles">
            <h1 class="head__title">VIDEO LIVE TRANSLATE</h1>
            <p class="head__status"><span class="head__dot" aria-hidden="true"></span> LOCAL PIPELINE ACTIVE</p>
          </div>
        </div>
        <button type="button" class="head__gear" id="btnSettings" title="設定" aria-label="開啟擴充選項">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linejoin="round"
            />
            <path
              d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9c.26.6.84 1 1.55 1H21a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </header>

      <section class="lang-axis" aria-label="語音翻譯語向">
        <div class="lang-axis__head">
          <button type="button" class="lang-axis__swap" id="popupLangAxisSwap">
            ⇄
          </button>
          <h2 class="lang-axis__title">語音翻譯語向</h2>
        </div>
        <div class="lang-axis__grid">
          <label class="lang-axis__field">
            <span class="lang-axis__label">來源（聽譯）</span>
            <select id="popupAsrSourceLang" class="lang-axis__select" aria-label="來源語言"></select>
          </label>
          <label class="lang-axis__field">
            <span class="lang-axis__label">譯為</span>
            <select id="popupTranslateTargetLang" class="lang-axis__select" aria-label="譯為語言"></select>
          </label>
        </div>
        <p class="lang-axis__hint" id="popupLangAxisHint"></p>
      </section>

      <section class="card card--summary" aria-labelledby="summaryTitle">
        <div class="card__top">
          <h2 id="summaryTitle" class="card__title">系統管線摘要</h2>
          <span class="card__shield" aria-hidden="true" title="本機管線">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
                fill="color-mix(in srgb, var(--accent) 20%, transparent)"
              />
              <path d="M9 12l2 2 4-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <div class="kv">
          <div class="kv__row">
            <span class="kv__k">WHISPER 端點</span>
            <span class="kv__v kv__v--mono" id="whisperEndpoint">—</span>
          </div>
          <div class="kv__row kv__row--chunk">
            <div class="chunk-quick">
              <span class="kv__k">切段時長</span>
              <span class="chunk-quick__val" id="popupChunkSecVal">—</span>
            </div>
            <input type="range" class="chunk-quick__range" id="popupChunkSec" />
          </div>
        </div>
        <div class="divider" role="presentation"></div>
        <div class="card__bottom">
          <div class="translator">
            <span class="translator__icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5" />
                <path d="M9 9h6M9 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </span>
            <span class="translator__text" id="translatorInfo">翻譯器: Ollama (Local)</span>
          </div>
          <span class="badge" id="pipelineBadge">READY</span>
        </div>
      </section>

      <div class="capture-block">
        <button type="button" id="btnStart" class="btn-capture">
          <svg class="btn-capture__play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5v14l11-7L8 5z" />
          </svg>
          開始擷取音訊
        </button>
        <button type="button" id="btnStop" class="btn-stop" hidden>
          <svg class="btn-stop__sq" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="1" />
          </svg>
          停止擷取
        </button>
      </div>

      <div class="util-row">
        <button type="button" id="btnDemoLine" class="btn-util" disabled>
          <span class="btn-util__icon" aria-hidden="true">▤</span>
          傳送示範字幕
        </button>
        <div class="debug-box">
          <span class="debug-box__icon" aria-hidden="true">⌗</span>
          <span class="debug-box__label">除錯浮層</span>
          <label class="toggle">
            <input type="checkbox" id="debugHud" />
            <span class="toggle__track" aria-hidden="true"><span class="toggle__knob"></span></span>
          </label>
        </div>
      </div>

      <footer class="foot">
        <span class="foot__icon" aria-hidden="true">i</span>
        <p class="foot__text">
          請確保 <a href="#" id="linkWhisper" class="foot__link">whisper-server</a> 與
          <a href="#" id="linkOllama" class="foot__link">Ollama</a> 已啟動。
        </p>
      </footer>

      <p id="status" class="status" aria-live="polite"></p>
    </div>
    <script src="../shared/vlt_constants.js"></script>
    <script src="../shared/vlt_locale_meta.js"></script>
    <script src="../shared/vlt_messages.js"></script>
    <script src="../shared/vlt_source_lang.js"></script>
    <script src="../shared/vlt_translate_engine.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
